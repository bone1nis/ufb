# ============================================================================
# .gitlab-ci.yml - backend (командный репозиторий)
# ============================================================================
# Назначение:
#   Подключает платформенный workflow backend.yml и задаёт переменные,
#   специфичные для backend-репозитория команды.
#
# Важно:
#   Матрица сценария деплоя задаётся здесь:
#     DEPLOY_MODE
#     NEEDS_DB
#     DB_TYPE
#
#   Секреты здесь НЕ задаются. Их нужно хранить в GitLab CI/CD Variables:
#     DB_PASS
#     BOT_TOKEN
#
# Этот файл команды НЕ редактируют без согласования с наставниками.
# Вся бизнес-логика должна находиться в коде приложения и Dockerfile.
# ============================================================================

include:
  - project: "hackathon-2026/platform"
    ref: "main"
    file: "workflows/backend.yml"

variables:
  # --------------------------------------------------------------------------
  # 1. СЕРВИС
  # --------------------------------------------------------------------------

  # Идентификатор сервиса в составе команды.
  SERVICE_NAME: "backend"

  # Путь к docker compose файлу backend из платформенного репозитория.
  # deploy-remote.sh использует этот файл для деплоя на удалённый хост.
  COMPOSE_FILE: ".platform/compose/backend.yml"

  # Суффикс имени образа:
  #   <registry>/<team>/<IMAGE_NAME_SUFFIX>:<sha>
  IMAGE_NAME_SUFFIX: "backend"

  # Путь к Dockerfile в командном репозитории.
  DOCKERFILE_PATH: "./Dockerfile"

  # --------------------------------------------------------------------------
  # 2. RUNTIME
  # --------------------------------------------------------------------------

  # Внутренний порт приложения внутри контейнера.
  # Должен совпадать с EXPOSE в Dockerfile и ASPNETCORE_URLS.
  CONTAINER_PORT: "8080"

  # HTTP endpoint для healthcheck.
  # Должен существовать в приложении и совпадать с compose/backend.yml.
  HEALTHCHECK_PATH: "/health"

  # Порт backend внутри docker compose сети.
  # Используется другими сервисами, если они обращаются к backend по сети.
  BACKEND_PORT: "8080"

  # --------------------------------------------------------------------------
  # 3. МАТРИЦА СЦЕНАРИЯ
  # --------------------------------------------------------------------------

  # Режим работы backend:
  #   web  - HTTP API / backend
  #   bot  - backend в режиме бота
  #   full - расширенный runtime-сценарий
  DEPLOY_MODE: "full"

  # Нужна ли приложению база данных:
  #   false - БД не используется
  #   true  - БД используется, тип задаётся через DB_TYPE
  NEEDS_DB: "true"

  # Тип базы данных:
  #   none     - БД не используется
  #   sqlite   - файловая SQLite БД внутри backend volume
  #   postgres - отдельный PostgreSQL контейнер
  DB_TYPE: "postgres"

  # --------------------------------------------------------------------------
  # 4. СЕКРЕТЫ
  # --------------------------------------------------------------------------

  # BOT_TOKEN задаётся только через GitLab CI/CD Variables.
  # Здесь его не указываем, чтобы не хранить секреты в репозитории.
  #
  # DB_PASS для PostgreSQL также задаётся через GitLab CI/CD Variables.

# Jobs не описываем - их полностью даёт подключённый workflow backend.yml.
