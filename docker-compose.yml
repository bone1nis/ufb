services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hack_backend
      POSTGRES_USER: hack_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hack_user -d hack_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hack_backend
      DB_USER: hack_user
      DB_PASS: secret
      JWT_SECRET: dev-secret-change-in-production-32ch
      UPLOADS_PATH: /app/data/uploads
      FRONTEND_ORIGIN: "http://localhost:5173"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pg_data:
  uploads:
